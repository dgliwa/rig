  - id: mood
    manufacturer: Chase Bliss Audio
    model: Mood MkII
    type: digital
    config:
      type: chase_bliss
      midi_channel: 2
      model: Mood MkII
    presets:
      - id: ambient-reverse-tape
        name: Ambient Reverse Tape
        preset_number: 3
        notes: "Ambient reverb with a slight reverse tape loop"
        parameters:
          time: 32        # 2–3 o'clock — long reverb decay
          mix: 77         # 11 o'clock — subtle wet blend, preserves dry signal
          length: 50      # noon — neutral, looper not primary here
          wet_modify: 44  # 1 o'clock — medium smear/diffusion
          clock: 44      # 64k (fully CW) — clean/hi-fi, no aliasing
          loop_clock_division: 5
          loop_modify: 30 # noon — normal forward playback
          ramp_speed: 0   # No ramping — static pad when frozen
          wet_channel: 0  # reverb — ambient wash mode
          routing: 2      # loop — reverb processes loop output only (not live signal)
          loop: 1         # tape — warm loop texture if looper engaged
          dip_r_trails: 127 # TRAILS on — wet fades smoothly after bypass
          dip_r_latch: 127  # LATCH on — freeze stays hands-free after hold

      - id: chorus-shimmer
        name: Chorus Shimmer
        preset_number: 7
        notes: "Short-delay chorus shimmer — wet_channel delay path at short time (35) creates chorus-like shimmer. Routing: out covers live signal and loop output simultaneously. Think Smashing Pumpkins 'Today' rhythm chorus texture."
        parameters:
          time: 35         # Short delay — chorus-character shimmer range
          mix: 72          # Present, audible chorus texture — not a background shimmer
          length: 50       # noon — neutral
          wet_modify: 40   # Moderate feedback — adds depth without runaway
          clock: 60        # Moderate — hi-fi with slight warmth
          loop_modify: 64  # noon — normal playback
          ramp_speed: 0    # No ramping
          wet_channel: 1   # delay — chorus-like shimmer path
          routing: 1       # out — wet applies to full output (live signal + loop)
          loop: 1          # tape — warm texture
          dip_r_trails: 127  # TRAILS on — smooth bypass fade

