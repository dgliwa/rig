          type: knob
          midi_cc: 14
          min: 0
          max: 127
        - name: volume
          type: knob
          midi_cc: 15
          min: 0
          max: 127
        - name: mix
          type: knob
          midi_cc: 16
          min: 0
          max: 127
        - name: rate
          type: knob
          midi_cc: 17
          min: 0
          max: 127
        - name: depth
          type: knob
          midi_cc: 18
          min: 0
          max: 127
        - name: form
          type: knob
          midi_cc: 19
          min: 0
          max: 127
        - name: ramp
          type: knob
          midi_cc: 20
          min: 0
          max: 127
        - name: clock_division
          type: toggle
          midi_cc: 21
          min: 0
          max: 5
          positions:
            - whole
            - half
            - quarter_triplet
            - quarter
            - eighth
            - sixteenth
        - name: midi_clock_ignore
          type: switch
          midi_cc: 51
          min: 0
          max: 127
        - name: tap_tempo
          type: switch
          midi_cc: 93
          min: 0
          max: 127
        - name: expression_over_midi
          type: switch
          midi_cc: 100
          min: 0
          max: 127
        - name: bypass
          type: switch
          midi_cc: 102
          min: 0
          max: 127
    presets:
      - id: slow-vibe
        name: Slow Vibe
        preset_number: 1
        notes: Deep, slow vibrato for ambient swells and pads
        parameters:
          feed: 50     # Moderate feedback for smooth warbling
          volume: 60   # Slight boost
          mix: 70      # Heavy wet blend for pronounced effect
          rate: 30     # Slow speed — lazy, hypnotic pulse
          depth: 100   # Deep modulation for dramatic warble
          form: 60     # Sine-like waveform
          ramp: 0      # No ramping
          clock_division: 3  # quarter — base tempo reference
      - id: trem-pulse
        name: Trem Pulse
        preset_number: 2
        notes: Rhythmic tremolo for arpeggiated passages
        parameters:
          feed: 65     # Higher feedback for sharper edge
          volume: 55   # Unity
          mix: 80      # Heavy blend for pronounced tremolo
          rate: 72     # Medium-fast for rhythmic pulse
          depth: 85    # Deep chop
          form: 90     # Square-ish waveform for hard trem cuts
          ramp: 0      # No ramping
          clock_division: 4  # eighth — faster rhythmic subdivision

