    presets:
      - id: liquid-ambient-wash
        name: Liquid Ambient Wash
        preset_number: 3
        notes: "Frozen pad under clean Fender tone — doc recipe ①a. Freeze a chord into an infinite pad, solo dry over it. LATCH keeps freeze hands-free."
        parameters:
          time: 95        # 2–3 o'clock — long reverb decay
          mix: 48         # 11 o'clock — subtle wet blend, preserves dry signal
          length: 64      # noon — neutral, looper not primary here
          wet_modify: 80  # 1 o'clock — medium smear/diffusion
          clock: 127      # 64k (fully CW) — clean/hi-fi, no aliasing
          loop_modify: 64 # noon — normal forward playback
          ramp_speed: 0   # No ramping — static pad when frozen
          wet_channel: 0  # reverb — ambient wash mode
          routing: 0      # in — wet processes live signal only
          loop: 1         # tape — warm loop texture if looper engaged
          dip_r_trails: 127 # TRAILS on — wet fades smoothly after bypass
          dip_r_latch: 127  # LATCH on — freeze stays hands-free after hold
      - id: dub-tape-delay
        name: Dub Tape Delay
        preset_number: 4
        notes: "Rhythmic dub delay texture under crunch — doc recipe ②. High feedback just below runaway; roll CLOCK down live to pitch-drop repeats into dub bloops."
        parameters:
          time: 64        # noon — medium delay time
          mix: 64         # noon — balanced wet/dry
          length: 64      # noon — neutral
          wet_modify: 95  # 2–3 o'clock — high feedback, just below runaway
          clock: 50       # ~24–32k — slight warmth/tape character (roll CW for clean, CCW for bloop)
          loop_modify: 64 # noon — normal playback
          ramp_speed: 0   # No ramping — manual CLOCK sweep is the performance move
          wet_channel: 1  # delay — rhythmic repeats
          routing: 0      # in — wet processes live signal only
          loop: 1         # tape — warm loop bed
          dip_r_trails: 127 # TRAILS on — delay fades on bypass
      - id: granular-bloop-cloud
        name: Granular Bloop Cloud
        preset_number: 5
        notes: "Slip-mode granular re-sampler — doc recipe ④. Single notes shatter into re-pitched grains. Hold left footswitch to freeze a grain cloud and play over it."
        parameters:
          time: 45        # 10–11 o'clock — fast refresh rate, more grain scramble
          mix: 64         # noon — even wet/dry balance
          length: 64      # noon — neutral
          wet_modify: 70  # Just off-center — grains slightly slowed/reversed for bloopy character
          clock: 45       # ~16–32k — some aliasing adds grit to grains over high-gain lead
          loop_modify: 64 # noon — neutral loop playback
          ramp_speed: 0   # No ramping
          wet_channel: 2  # slip — granular re-sampler mode
          routing: 0      # in — processes live signal
          loop: 1         # tape — warm loop texture
          dip_r_trails: 127 # TRAILS on — grain cloud fades on bypass
      - id: reverse-stretch-drift
        name: Reverse-Stretch Drift Cloud
        preset_number: 6
        notes: "Smeared reversed time-stretch cloud — doc recipe ⑦ (Tier 2). Chord becomes a drifting, reversed, pitch-stretched cloud. BOUNCE + CLOCK ramp = self-generating drone. Wacky territory."
        parameters:
          time: 95        # 2–3 o'clock — long reverb decay washing over the loop cloud
          mix: 64         # noon — blend frozen reverb with loop
          length: 30      # Small — small slice size for stretch mode granular feel
          wet_modify: 80  # Moderate reverb smear/diffusion
          clock: 127      # 64k — clean input into stretch processor
          loop_modify: 25 # Off-center/negative — stretch + reverse playback direction
          ramp_speed: 30  # Slow auto-ramp for gradual pitch drift (BOUNCE must be on)
          wet_channel: 0  # reverb — washes over the stretch cloud
          routing: 2      # wet (loop only) — reverb only touches loop, live stays dry
          loop: 2         # stretch — time-stretch slices
          dip_l_bounce: 127 # BOUNCE on — CLOCK ramps on waveform for generative drift
          dip_l_clock: 127  # CLOCK ramp dip — auto-modulates clock for pitch drift
          dip_r_trails: 127 # TRAILS on — cloud fades on bypass
          dip_r_latch: 127  # LATCH on — freeze stays hands-free
          dip_r_smooth: 127 # SMOOTH on — fluid CLOCK glides (removes stepping)

  - id: mc6
    manufacturer: Morningstar
    model: MC6
    type: controller
    config:
      type: controller
      midi_channel: 1
      scenes:
        clean:
          description: "Clean Fender with phaser vibe and doubling"
          presets:
            hx-stomp: princeton
            billy-strings-wombtone: slow-vibe
            brothers: am-crunch
            mood: liquid-ambient-wash
        crunch:
          description: "British crunch with Brothers OD and ambient pad"
          presets:
            hx-stomp: marshall
            brothers: am-crunch
            mood: dub-tape-delay
        lead:
          description: "High gain Boogie lead with Brothers boost and broken tape"
          presets:
            hx-stomp: boogie-pb
            brothers: am-crunch
            mood: granular-bloop-cloud
        wacky:
          description: "BOC saturated lead with tremolo and Sigur Rós drone"
          presets:
            hx-stomp: doogie-pb
            billy-strings-wombtone: trem-pulse
            mood: reverse-stretch-drift
      banks:
        - bank: 1
          name: Main Rig
          switches:
            A:
              scene: clean
            B:
              scene: crunch
            C:
              scene: lead
            D:
              scene: wacky
