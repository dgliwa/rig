          min: 0
          max: 127
    presets:
      - id: am-crunch
        name: AM Crunch
        preset_number: 1
        notes: Arctic Monkeys-style edge-of-breakup crunch (Alex Turner vibe)
        parameters:
          gain_2: 65     # Moderate OD gain — pushed but not fuzzy
          volume_2: 70   # Slight boost over unity
          gain_1: 30     # Light boost gain
          volume_1: 55   # Unity-ish
          tone_2: 60     # Slightly bright
          tone_1: 50     # Neutral
          presence_2: 55
          presence_1: 50
          gain_2_type: 1   # od — smooth overdrive
          treble_boost: 2  # half_sun — subtle treble lift
          gain_1_type: 2   # boost — clean boost side

  - id: billy-strings-wombtone
    manufacturer: Chase Bliss Audio
    model: Wombtone MkII
    type: digital
    config:
      type: chase_bliss
      midi_channel: 3
      controls:
        - name: feed
          type: knob
          midi_cc: 14
          min: 0
          max: 127
        - name: volume
          type: knob
          midi_cc: 15
          min: 0
          max: 127
        - name: mix
          type: knob
          midi_cc: 16
          min: 0
          max: 127
        - name: rate
          type: knob
          midi_cc: 17
          min: 0
          max: 127
        - name: depth
          type: knob
          midi_cc: 18
          min: 0
          max: 127
        - name: form
          type: knob
          midi_cc: 19
          min: 0
          max: 127
        - name: ramp
          type: knob
          midi_cc: 20
          min: 0
          max: 127
        - name: clock_division
          type: toggle
          midi_cc: 21
          min: 0
          max: 5
          positions:
            - whole
            - half
            - quarter_triplet
            - quarter
            - eighth
            - sixteenth
        - name: midi_clock_ignore
          type: switch
          midi_cc: 51
          min: 0
          max: 127
        - name: tap_tempo
          type: switch
          midi_cc: 93
          min: 0
          max: 127
        - name: expression_over_midi
          type: switch
          midi_cc: 100
          min: 0
          max: 127
        - name: bypass
          type: switch
          midi_cc: 102
          min: 0
          max: 127
    presets:
      - id: slow-vibe
        name: Slow Vibe
        preset_number: 1
        notes: Deep, slow vibrato for ambient swells and pads
        parameters:
          feed: 50     # Moderate feedback for smooth warbling
          volume: 60   # Slight boost
          mix: 70      # Heavy wet blend for pronounced effect
          rate: 30     # Slow speed — lazy, hypnotic pulse
          depth: 100   # Deep modulation for dramatic warble
          form: 60     # Sine-like waveform
          ramp: 0      # No ramping
          clock_division: 3  # quarter — base tempo reference
      - id: trem-pulse
        name: Trem Pulse
        preset_number: 2
        notes: Rhythmic tremolo for arpeggiated passages
        parameters:
          feed: 65     # Higher feedback for sharper edge
          volume: 55   # Unity
          mix: 80      # Heavy blend for pronounced tremolo
          rate: 72     # Medium-fast for rhythmic pulse
          depth: 85    # Deep chop
          form: 90     # Square-ish waveform for hard trem cuts
          ramp: 0      # No ramping
          clock_division: 4  # eighth — faster rhythmic subdivision

  - id: hx-stomp
    manufacturer: Line 6
    model: HX Stomp
    type: modeler
    config:
      type: midi
      midi_channel: 1
    presets:
      - id: princeton
        name: Princeton D
        preset_number: 36
        hlx_file: hlx/Princeton D.hlx
        notes: Clean Fender tone, D path
      - id: marshall
        name: Marshall D
        preset_number: 37
        hlx_file: hlx/Marshall D.hlx
        notes: British crunch, D path
      - id: boogie-pb
        name: Boogie PB
        preset_number: 38
        hlx_file: hlx/Boogie PB.hlx
      - id: doogie-pb
        name: Doogie PB
        preset_number: 39
        hlx_file: hlx/Doogie PB.hlx

