- id: mood
  manufacturer: Chase Bliss Audio
  model: Mood MkII
  type: digital
  config:
    type: chase_bliss
    midi_channel: 2
    model: Mood MkII
  presets:
  - id: ambient-reverse-tape
    name: Ambient Reverse Tape
    preset_number: 3
    notes: Ambient reverb with a slight reverse tape loop
    parameters:
      time: 32            # 2–3 o'clock — long reverb decay
      mix: 77             # 11 o'clock — subtle wet blend, preserves dry signal
      length: 50          # noon — neutral, looper not primary here
      wet_modify: 44      # 1 o'clock — medium smear/diffusion
      clock: 44          # 64k (fully CW) — clean/hi-fi, no aliasing
      loop_clock_division: 5
      loop_modify: 30     # noon — normal forward playback
      ramp_speed: 0       # No ramping — static pad when frozen
      wet_channel: 0      # reverb — ambient wash mode
      routing: 2          # loop — reverb processes loop output only (not live signal)
      loop: 1             # tape — warm loop texture if looper engaged
      dip_r_trails: 127     # TRAILS on — wet fades smoothly after bypass
      dip_r_latch: 127      # LATCH on — freeze stays hands-free after hold

  - id: chorus-shimmer
    name: Chorus Shimmer
    preset_number: 7
    notes: "Short-delay chorus shimmer — wet_channel delay path at short time (35)
      creates chorus-like shimmer. Routing: out covers live signal and loop output
      simultaneously. Think Smashing Pumpkins 'Today' rhythm chorus texture."
    parameters:
      time: 30
      mix: 50
      length: 50.0
      wet_modify: 90
      clock: 123
      loop_modify: 40
      ramp_speed: 64
      wet_channel: 1.0
      routing: 1.0
      loop: 1.0
      loop_overdub: 1
      wet_bypass: 1
      dip_r_trails: 127.0
      dip_l_bounce: 1
      dip_l_wet_modify: 1
      dip_r_smooth: 1
      dip_r_latch: 1
      dip_r_no_dub: 1

