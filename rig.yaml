          volume_2: 70   # Slight boost over unity
          gain_1: 30     # Light boost gain
          volume_1: 55   # Unity-ish
          tone_2: 60     # Slightly bright
          tone_1: 50     # Neutral
          presence_2: 55
          presence_1: 50
          gain_2_type: 1   # od — smooth overdrive
          treble_boost: 2  # half_sun — subtle treble lift
          gain_1_type: 2   # boost — clean boost side

  - id: billy-strings-wombtone
