name: Derek's Rig
description: Brothers → Wombtone → HX Stomp → Mood MkII (MC6 controller)
devices:
- id: brothers
  manufacturer: Chase Bliss Audio
  model: Brothers AM
  type: digital
  config:
    type: chase_bliss
    midi_channel: 4
    model: Brothers AM
  presets:
      # - id: am-crunch
      #   name: AM Crunch
      #   preset_number: 3
      #   notes: Arctic Monkeys-style edge-of-breakup crunch (Alex Turner vibe)
      #   parameters:
      #     gain_2: 83     # Moderate OD gain — pushed but not fuzzy
      #     volume_2: 89   # Slight boost over unity
      #     gain_1: 38     # Light boost gain
      #     volume_1: 70   # Unity-ish
      #     tone_2: 76     # Slightly bright
      #     tone_1: 64     # Neutral
      #     presence_2: 70
      #     presence_1: 64
      #     gain_2_type: 1   # od — smooth overdrive
      #     treble_boost: 2  # half_sun — subtle treble lift
      #     gain_1_type: 2   # boost — clean boost side

  - id: transparent-lift
    name: Transparent Lift
    preset_number: 4
    notes: Single-channel clean boost — doc recipe ①. Ch1 BOOST at low gain 
      lifts volume and feel without adding grit. Ch2 bypassed. Treble toggle OFF
      for the pure KOT voice (no Rangemaster).
    parameters:
      gain_1: 13         # ~8 o'clock — minimal gain, pure volume lift
      volume_1: 83       # ~1–2 o'clock — noticeable boost above unity
      tone_1: 64         # noon — neutral
      presence_1: 0      # down — default; stacking treble boost adds ice-pick top end
      gain_1_type: 2      # boost — cleanest, loudest mode
      treble_boost: 1      # off — pure KOT voice
      channel_2_bypass: 0      # Ch2 bypassed — single-channel preset

  - id: rock-drive
    name: Rock Drive
    preset_number: 5
    notes: Dual-channel rock preset — Ch1 BOOST pushes louder than 
      transparent-lift (Buddy Holly rhythm level); Ch2 DIST with HI GAIN 2 
      engaged for Say It Ain't So solo saturation. Both channels active 
      simultaneously.
    parameters:
      gain_1: 42           # ~10 o'clock — moderate boost, noticeably driven vs transparent-lift (13)
      volume_1: 90         # ~2 o'clock — louder than transparent-lift (83); rhythm level push
      tone_1: 64           # noon — neutral
      presence_1: 0        # down — default
      gain_1_type: 2       # boost — cleanest, loudest Ch1 mode (0=boost, 1=od, 2=dist)
      gain_2: 89           # ~2 o'clock — high-gain distortion, solo territory
      volume_2: 76         # ~1 o'clock — output level with Ch2 distortion
      tone_2: 64           # noon — neutral
      presence_2: 0        # down — default
      gain_2_type: 2       # dist — hard clipping for saturation
      treble_boost: 1      # off — pure KOT voice, no Rangemaster coloring
      dip_hi_gain_2: 1      # HI GAIN 2 on — +25% gain on Ch2 for lead-sustain saturation

      # - id: kot-lead-stack
      #   name: KOT Lead Stack
      #   preset_number: 5
      #   notes: "Two-stage lead boost — doc recipe ⑤. Ch2=OD is your always-on rhythm tone; stomp Ch1 (BOOST) to push Ch2 harder for solos. MASTER dip prevents volume spike when engaging Ch1."
      #   parameters:
      #     gain_2: 51     # ~11 o'clock — edge-of-breakup OD base
      #     volume_2: 76   # ~1 o'clock — slightly above unity (governs output with MASTER on)
      #     tone_2: 64     # noon — neutral
      #     presence_2: 0  # down — default
      #     gain_2_type: 1  # od — classic King of Tone voice
      #     gain_1: 38     # ~10 o'clock — moderate boost push into Ch2
      #     volume_1: 83   # ~1–2 o'clock — pushes Ch2 harder; not a volume control with MASTER on
      #     tone_1: 64     # noon — neutral
      #     presence_1: 0  # down — default
      #     gain_1_type: 2  # boost — transparent overloader feeding Ch2
      #     treble_boost: 1  # off — balanced KOT voice; swap to 2 (half_sun) for brighter solos
      #     dip_master: 1   # MASTER on — VOL2 governs output at all times; Ch1 can't spike levels

      # - id: bad-bros
      #   name: Bad Bros
      #   preset_number: 6
      #   notes: "Max gnarly stack — doc recipe ⑨ (factory 'Bad Bros'). Rangemaster into BOOST into DIST, both HI GAINs on. TONE2 dialed back slightly to offset the treble-heavy stack."
      #   parameters:
      #     gain_2: 89     # ~2 o'clock — high-gain distortion
      #     volume_2: 76   # ~1 o'clock — final output (MASTER on)
      #     tone_2: 57     # ~11 o'clock — slightly dark to offset treble booster stack
      #     presence_2: 0  # down — don't pile top end into an already-bright signal
      #     gain_2_type: 2  # dist — hard clipping for max saturation
      #     gain_1: 96     # ~2–3 o'clock — driving treble booster and Ch2 hard
      #     volume_1: 70   # near unity — MASTER means this doesn't affect output level
      #     tone_1: 64     # noon
      #     presence_1: 0  # down
      #     gain_1_type: 2  # boost — Ch1 as overloader feeding Ch2
      #     treble_boost: 2  # half_sun — classic Rangemaster voice up front for snarl
      #     dip_hi_gain_1: 1  # HI GAIN 1 on — +25% gain on Ch1, LED red
      #     dip_hi_gain_2: 1  # HI GAIN 2 on — +25% gain on Ch2, LED red
      #     dip_master: 1     # MASTER on — VOL2 controls final output; needed with stacked boosts

- id: billy-strings-wombtone
  manufacturer: Chase Bliss Audio
  model: Wombtone MkII
  type: digital
  config:
    type: chase_bliss
    midi_channel: 3
    model: Wombtone MkII
  presets:
  - id: slow-vibe
    name: Slow Vibe
    preset_number: 3
    notes: Deep, slow vibrato for ambient swells and pads
    parameters:
      feed: 64         # Noon
      volume: 70       # Noon
      mix: 64          # Noon
      rate: 48         # Slow speed — lazy, hypnotic pulse
      depth: 45       # chill modulation for dramatic warble
      form: 64         # Sine-like waveform
      ramp: 0          # No ramping
      clock_division: 2      # quarter — base tempo reference

  - id: envelope-filter
    name: Envelope Filter
    preset_number: 6
    notes: 'Static cocked-wah phaser — rate frozen at 0, high resonance (feed: 100)
      parks the phase sweep in the vowel sweet spot. Texture device in rock chain,
      not a performance sweep. Deep depth for obvious coloring.'
    parameters:
      feed: 100            # High resonance — pronounced vowel/wah peak character
      volume: 70           # Unity
      mix: 70              # Moderate blend — filter vowel present without swallowing dry signal
      rate: 30              # Slow
      depth: 115           # Near-max — clearly audible phaser freeze, obvious coloring
      form: 64             # Sine-like waveform
      ramp: 0              # No ramping
      clock_division: 2      # quarter — base tempo reference

      # - id: lead-vibe
      #   name: Lead Vibe
      #   preset_number: 4
      #   notes: Deep, slow vibrato for ambient swells and pads
      #   parameters:
      #     feed: 90     # Moderate feedback for smooth warbling
      #     volume: 76   # Slight boost
      #     mix: 89      # Heavy wet blend for pronounced effect
      #     rate: 64     # Slow speed — lazy, hypnotic pulse
      #     depth: 95   # Deep modulation for dramatic warble
      #     form: 64     # Sine-like waveform
      #     ramp: 0      # No ramping
      #     clock_division: 2  # quarter — base tempo reference
      # - id: trem-pulse
      #   name: Trem Pulse
      #   preset_number: 5
      #   notes: Rhythmic tremolo for arpeggiated passages
      #   parameters:
      #     feed: 83     # Higher feedback for sharper edge
      #     volume: 70   # Unity
      #     mix: 102     # Heavy blend for pronounced tremolo
      #     rate: 91     # Medium-fast for rhythmic pulse
      #     depth: 108   # Deep chop
      #     form: 114    # Square-ish waveform for hard trem cuts
      #     ramp: 0      # No ramping
      #     clock_division: 4  # eighth — faster rhythmic subdivision

