    type: amp
    model: "US Double Nrm"
    settings:
      Drive: 3.0
      Bass: 5.0
      Mid: 5.0
      Treble: 6.0
      Master: 5.0
  - name: Cab
    type: cab
    model: "4x12 Greenback 25"
    settings: {}
  - name: Reverb
    type: reverb
    model: "Plate"
    settings:
      Mix: 60
      Decay: 70
